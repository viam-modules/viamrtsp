name: Build viamrtsp for Windows

on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md' 

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            build_method: cross-compile
            docker_image: ghcr.io/viamrobotics/rdk-devenv:amd64-cache
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v3

    - name: Build module
      uses: ./.github/actions/build-module
      with:
        target_os: windows
        target_arch: amd64
        docker_image: ${{ matrix.docker_image }}

    - name: Verify Windows binary exists
      run: |
        if [ -f bin/windows-amd64/viamrtsp.exe ]; then
          echo "Windows binary found"
          file bin/windows-amd64/viamrtsp.exe
        else
          echo "Windows binary not found"
          exit 1
        fi
      shell: bash
